<!DOCTYPE html>

<html lang="tr">

    <head>

        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- http://getbootstrap.com/docs/5.3/ -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

        <link href="/static/styles.css" rel="stylesheet">

        <style>
            body {
                animation: fadeIn 0.5s;
            }
            
            @keyframes fadeIn {
                from { opacity: 0; }
                to { opacity: 1; }
            }

            .alert { 
                animation: slideIn 0.3s; 
            }
            
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>

        <title>Hocamı Yıldızla | {%block title%}{%endblock%}</title>
    </head>

    <body>

        <div class="container-fluid">
            <nav class="navbar navbar-expand-lg bg-dark navbar-dark ">
                <a class="navbar-brand" href="/">Hocamı Yıldızla</a>
                <form action="/search" method="get" class="d-flex ms-auto">
                    <input class="form-control" type="search" placeholder="Hoca adı gir" aria-label="Search" id="hoca_adi" name="hoca_adi">
                    <button class="btn btn-outline-light" type="submit" id="search-button">Ara</button>  
                </form>
            </nav>
                
        </div>

        <div class="container">

            {%block content%}{%endblock%}

        </div>








        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>

</html>
